async function sha256(m){var e=new TextEncoder().encode(m);var h=await crypto.subtle.digest("SHA-256",e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")}
function decodeUtf8Base64(b64){var bin=atob(b64);var bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++){bytes[i]=bin.charCodeAt(i)}return new TextDecoder("utf-8").decode(bytes)}
async function unlock(){var p=document.getElementById("pw").value;var h=await sha256(p);if(h===H){document.open();document.write(decodeUtf8Base64(D));document.close()}else{document.getElementById("err").style.display="block"}}
